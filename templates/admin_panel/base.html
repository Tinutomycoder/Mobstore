<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="d-flex">
    <aside class="admin-sidebar bg-dark text-white p-3">
        <div class="mb-4 text-center"><img src="/static/images/mobstore-logo.png" alt="Mobstore" class="brand-logo-sidebar"><div class="small text-white-50 mt-2">Admin Panel</div></div>
        <nav class="nav flex-column gap-2">
            <a class="nav-link text-white" href="{% url 'admin_dashboard' %}">Dashboard</a>
            <a class="nav-link text-white" href="{% url 'admin_products' %}">Manage Products</a>
            <a class="nav-link text-white" href="{% url 'admin_categories' %}">Manage Categories</a>
            <a class="nav-link text-white" href="{% url 'admin_orders' %}">Manage Orders</a>
            <a class="nav-link text-white" href="{% url 'admin_users' %}">Manage Users</a>
            <form method="post" action="{% url 'admin_logout' %}">
                {% csrf_token %}
                <button class="btn btn-outline-light btn-sm mt-2">Logout</button>
            </form>
        </nav>
    </aside>
    <main class="flex-grow-1 p-4 bg-light min-vh-100">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
